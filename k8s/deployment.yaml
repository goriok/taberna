apiVersion: apps/v1
kind: Deployment
metadata:
  name: taberna
  namespace: taberna
  labels:
    app: taberna
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taberna
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: taberna
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: taberna
          image: registry.registry.svc.cluster.local:5000/taberna:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: taberna-config
          env:
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: taberna-secret
                  key: LITELLM_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: taberna-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
