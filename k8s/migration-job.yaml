apiVersion: batch/v1
kind: Job
metadata:
  name: taberna-migration
  namespace: taberna
  labels:
    app: taberna
    component: migration
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: taberna
        component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: registry.registry.svc.cluster.local:5000/taberna:latest
          imagePullPolicy: Always
          command: ["bunx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: taberna-secret
                  key: DATABASE_URL
